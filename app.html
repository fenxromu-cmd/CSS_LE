<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIA</title>
<style>body{margin:0;background:#1A2B4A;display:flex;align-items:center;justify-content:center;height:100vh;color:#fff;font-family:Arial}</style>
</head>
<body>
<div id="msg">Chargement...</div>
<script>
(function(){
  var h=sessionStorage.getItem('__app_html__');
  if(!h){document.getElementById('msg').textContent='Session expirée.';setTimeout(function(){location.href='index.html';},2000);return;}
  sessionStorage.removeItem('__app_html__');
  var iframe=document.createElement('iframe');
  iframe.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;border:none;z-index:99999';
  iframe.srcdoc=h;
  document.body.innerHTML='';
  document.body.style.cssText='margin:0;padding:0;overflow:hidden;background:#fff';
  document.body.appendChild(iframe);
})();
<\/script>
</body>
</html>
