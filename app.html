<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1A2B4A;font-family:Arial,sans-serif}
#msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:16px}
iframe{position:fixed;top:0;left:0;width:100%;height:100%;border:none;z-index:9999;display:none}
</style>
</head>
<body>
<div id="msg">Chargement…</div>
<iframe id="app-frame" allowfullscreen></iframe>
<script>
(function(){
  var h = sessionStorage.getItem('__app_html__');
  if(!h){
    document.getElementById('msg').textContent = 'Session expirée. Redirection…';
    setTimeout(function(){ location.href = 'index.html'; }, 1500);
    return;
  }
  sessionStorage.removeItem('__app_html__');

  // Essai 1 : Blob URL (plus fiable que srcdoc pour les gros fichiers)
  try {
    var blob = new Blob([h], {type: 'text/html;charset=utf-8'});
    var url  = URL.createObjectURL(blob);
    if(url && url !== 'blob:null') {
      var frame = document.getElementById('app-frame');
      frame.src = url;
      frame.style.display = 'block';
      document.getElementById('msg').style.display = 'none';
      frame.onload = function(){ URL.revokeObjectURL(url); };
      return;
    }
  } catch(e1) { console.warn('Blob URL failed:', e1); }

  // Essai 2 : srcdoc (fallback)
  try {
    var frame = document.getElementById('app-frame');
    frame.srcdoc = h;
    frame.style.display = 'block';
    document.getElementById('msg').style.display = 'none';
    return;
  } catch(e2) { console.warn('srcdoc failed:', e2); }

  document.getElementById('msg').textContent = 'Erreur de chargement. Retour…';
  setTimeout(function(){ location.href = 'index.html'; }, 2000);
})();
</script>
</body>
</html>
